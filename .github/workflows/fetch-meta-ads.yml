name: Fetch Meta Ads Data

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas
  workflow_dispatch:          # permite rodar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados da UTMify
        env:
          UTMIFY_TOKEN: ${{ secrets.UTMIFY_TOKEN }}
        run: python scripts/fetch_utmify.py

      - name: Commit e push
        run: |
          git config user.email "action@github.com"
          git config user.name "OGARCOM Bot"
          git add data/meta-ads.json
          git diff --staged --quiet || git commit -m "update: meta ads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
